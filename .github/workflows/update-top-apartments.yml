name: Update Top Apartments

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scraper dependency
        run: python -m pip install --upgrade pip curl_cffi requests

      - name: Refresh top apartment feed
        run: python scripts/update_top_apartments.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/top_apartments.json; then
            echo "No apartment feed changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/top_apartments.json
          git commit -m "chore: refresh top apartments"
          git push
